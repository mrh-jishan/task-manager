apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "task-manager.backendName" . }}
  labels:
    {{- include "task-manager.backendLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "task-manager.backendSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "task-manager.backendSelectorLabels" . | nindent 8 }}
        {{- with .Values.backend.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.backend.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.backend.serviceAccount.create .Values.backend.serviceAccount.name }}
      serviceAccountName: {{ include "task-manager.backendServiceAccountName" . }}
      {{- end }}
      {{- $backendSecretEnabled := or .Values.backend.secret.existingSecret (and .Values.backend.secret.create .Values.backend.secret.railsMasterKey) }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.targetPort }}
              protocol: TCP
          {{- if or .Values.backend.env .Values.backend.secretsStore.enabled $backendSecretEnabled }}
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.backend.secretsStore.enabled }}
            - name: BACKEND_SECRETS_MOUNT_PATH
              value: {{ .Values.backend.secretsStore.mountPath | quote }}
            {{- end }}
            {{- if $backendSecretEnabled }}
            {{- range $key, $value := .Values.backend.secretEnv }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "task-manager.backendSecretName" . }}
                  key: {{ $value }}
            {{- end }}
            {{- end }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.readinessProbe.periodSeconds }}
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.backend.persistence.enabled }}
          volumeMounts:
            {{- if .Values.backend.secretsStore.enabled }}
            - name: backend-secrets-store
              mountPath: {{ .Values.backend.secretsStore.mountPath }}
              readOnly: true
            {{- end }}
            - name: backend-storage
              mountPath: /rails/storage
          {{- else if .Values.backend.secretsStore.enabled }}
          volumeMounts:
            - name: backend-secrets-store
              mountPath: {{ .Values.backend.secretsStore.mountPath }}
              readOnly: true
          {{- end }}
      {{- if or .Values.backend.persistence.enabled .Values.backend.secretsStore.enabled }}
      volumes:
        {{- if .Values.backend.secretsStore.enabled }}
        - name: backend-secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ include "task-manager.backendSecretProviderClassName" . }}
        {{- end }}
        {{- if .Values.backend.persistence.enabled }}
        - name: backend-storage
          persistentVolumeClaim:
            claimName: {{ include "task-manager.backendName" . }}-storage
        {{- end }}
      {{- end }}
