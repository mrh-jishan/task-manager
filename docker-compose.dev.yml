services:
  postgres:
    image: postgres:16-alpine
    container_name: task-manager-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-task_manager_development}
      POSTGRES_USER: ${POSTGRES_USER:-task_manager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-task_manager}
    ports:
      - "${DEV_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-task_manager} -d ${POSTGRES_DB:-task_manager_development}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: task-manager-backend-dev
    working_dir: /rails
    environment:
      BUNDLE_PATH: /usr/local/bundle
      RAILS_ENV: ${RAILS_ENV:-development}
      RAILS_MAX_THREADS: 5
      BACKEND_DATABASE_HOST: ${BACKEND_DATABASE_HOST:-postgres}
      BACKEND_DATABASE_PORT: ${BACKEND_DATABASE_PORT:-5432}
      BACKEND_DATABASE_NAME: ${BACKEND_DATABASE_NAME:-task_manager_development}
      BACKEND_DATABASE_USERNAME: ${BACKEND_DATABASE_USERNAME:-task_manager}
      BACKEND_DATABASE_PASSWORD: ${BACKEND_DATABASE_PASSWORD:-task_manager}
    ports:
      - "${DEV_BACKEND_PORT:-3000}:3000"
    volumes:
      - ./backend:/rails
      - backend_bundle:/usr/local/bundle
    depends_on:
      postgres:
        condition: service_healthy
    tty: true
    stdin_open: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: task-manager-frontend-dev
    working_dir: /app
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      CHOKIDAR_USEPOLLING: "true"
      HOST: 0.0.0.0
      PORT: 5173
      API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://backend:3000}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    depends_on:
      - backend
    ports:
      - "${DEV_FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    tty: true
    stdin_open: true

volumes:
  backend_bundle:
  frontend_node_modules:
  postgres_data_dev:
