name: Apply Terraform

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-aws.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Infrastructure environment"
        required: true
        default: stage
        type: choice
        options:
          - stage
          - production

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'production' || inputs.environment || 'stage' }}
    concurrency: terraform-${{ github.event_name == 'push' && 'production' || inputs.environment || 'stage' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      DEPLOY_ENV: ${{ github.event_name == 'push' && 'production' || inputs.environment || 'stage' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_TO_ASSUME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve Terraform Settings
        id: settings
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          OIDC_PROVIDER_ARN="arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com"

          if [ "${DEPLOY_ENV}" = "production" ]; then
            ENV_DIR="aws-prod"
          else
            ENV_DIR="aws-stage"
          fi

          echo "env_dir=${ENV_DIR}" >> "$GITHUB_OUTPUT"
          echo "github_oidc_provider_arn=${OIDC_PROVIDER_ARN}" >> "$GITHUB_OUTPUT"

      - name: Validate Terraform State Bucket
        run: |
          if [ -z "${TF_STATE_BUCKET}" ]; then
            echo "TF_STATE_BUCKET GitHub environment variable is required." >&2
            exit 1
          fi

      - name: Terraform Init
        run: |
          terraform -chdir="terraform/environments/${ENV_DIR}" init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=task-manager/${ENV_DIR}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"
        env:
          ENV_DIR: ${{ steps.settings.outputs.env_dir }}

      - name: Terraform Apply
        run: |
          terraform -chdir="terraform/environments/${ENV_DIR}" apply -auto-approve \
            -var="aws_region=${AWS_REGION}" \
            -var="github_repository=${GITHUB_REPOSITORY}" \
            -var="github_actions_oidc_provider_arn=${GITHUB_OIDC_PROVIDER_ARN}"
        env:
          ENV_DIR: ${{ steps.settings.outputs.env_dir }}
          GITHUB_OIDC_PROVIDER_ARN: ${{ steps.settings.outputs.github_oidc_provider_arn }}

      - name: Print Required GitHub Values
        run: |
          echo "database_secret_arn=$(terraform -chdir="terraform/environments/${ENV_DIR}" output -raw database_secret_arn)" >> "$GITHUB_STEP_SUMMARY"
          echo "github_actions_role_arn=$(terraform -chdir="terraform/environments/${ENV_DIR}" output -raw github_actions_role_arn)" >> "$GITHUB_STEP_SUMMARY"
        env:
          ENV_DIR: ${{ steps.settings.outputs.env_dir }}
