name: Deploy Cluster Addons

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: stage
        type: choice
        options:
          - stage
          - production

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'stage' }}
    concurrency: cluster-addons-${{ inputs.environment || 'stage' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Install AWS Load Balancer Controller
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          CLUSTER_PREFIX="${EKS_CLUSTER_NAME%-eks}"
          ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/${CLUSTER_PREFIX}-aws-load-balancer-controller-role"
          VPC_ID="$(aws eks describe-cluster --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION" --query 'cluster.resourcesVpcConfig.vpcId' --output text)"

          helm repo add eks https://aws.github.io/eks-charts
          helm repo update eks
          kubectl apply -f https://raw.githubusercontent.com/aws/eks-charts/master/stable/aws-load-balancer-controller/crds/crds.yaml

          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName="${EKS_CLUSTER_NAME}" \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set-string serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn="${ROLE_ARN}" \
            --set region="${AWS_REGION}" \
            --set vpcId="${VPC_ID}" \
            --wait

      - name: Print Controller Status
        run: |
          kubectl -n kube-system get deploy,pods,svc | grep aws-load-balancer-controller
