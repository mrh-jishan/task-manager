name: Deploy Frontend

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "helm/frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: stage
        type: choice
        options:
          - stage
          - production

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'production' || inputs.environment || 'stage' }}
    concurrency: frontend-${{ github.event_name == 'push' && 'production' || inputs.environment || 'stage' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
      FRONTEND_ECR_REPOSITORY: ${{ vars.FRONTEND_ECR_REPOSITORY }}
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Resolve Values File
        id: settings
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.environment }}" = "production" ]; then
            echo "values_file=./helm/frontend/values.prod.yaml" >> "$GITHUB_OUTPUT"
          else
            echo "values_file=./helm/frontend/values.stage.yaml" >> "$GITHUB_OUTPUT"
          fi
          echo "release_name=task-manager-frontend-${K8S_NAMESPACE}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Login To Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build And Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPOSITORY }}:${{ github.sha }}

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Recover Stuck Helm Release
        env:
          RELEASE_NAME: ${{ steps.settings.outputs.release_name }}
        run: |
          if ! helm status "${RELEASE_NAME}" --namespace "${K8S_NAMESPACE}" -o json >/tmp/helm-status.json 2>/dev/null; then
            echo "No existing Helm release to recover."
            exit 0
          fi

          STATUS="$(jq -r '.info.status // empty' /tmp/helm-status.json)"

          case "${STATUS}" in
            pending-install|pending-upgrade|pending-rollback)
              DEPLOYED_REVISION="$(helm history "${RELEASE_NAME}" --namespace "${K8S_NAMESPACE}" -o json | jq -r '[.[] | select(.status == "deployed")][-1].revision // empty')"

              if [ -n "${DEPLOYED_REVISION}" ] && [ "${DEPLOYED_REVISION}" != "null" ]; then
                echo "Recovering ${RELEASE_NAME} from ${STATUS} by rolling back to revision ${DEPLOYED_REVISION}."
                helm rollback "${RELEASE_NAME}" "${DEPLOYED_REVISION}" --namespace "${K8S_NAMESPACE}" --wait
              else
                echo "No deployed revision found for ${RELEASE_NAME}; uninstalling stuck release."
                helm uninstall "${RELEASE_NAME}" --namespace "${K8S_NAMESPACE}"
              fi
              ;;
            *)
              echo "Helm release ${RELEASE_NAME} status is ${STATUS}; no recovery needed."
              ;;
          esac

      - name: Create Namespace
        run: |
          kubectl create namespace "${K8S_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Install AWS Secrets Store CSI Provider
        run: echo "Frontend chart does not require Secrets Store CSI."

      - name: Deploy Helm Release
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          VALUES_FILE: ${{ steps.settings.outputs.values_file }}
          RELEASE_NAME: ${{ steps.settings.outputs.release_name }}
        run: |
          helm upgrade --install "${RELEASE_NAME}" ./helm/frontend \
            --namespace "${K8S_NAMESPACE}" \
            --create-namespace \
            -f ./helm/frontend/values.yaml \
            -f "${VALUES_FILE}" \
            -f ./helm/frontend/values.aws.yaml \
            --set image.repository="${REGISTRY}/${FRONTEND_ECR_REPOSITORY}" \
            --set image.tag="${GITHUB_SHA}" \
            --timeout 10m \
            --wait \
            --rollback-on-failure

      - name: Print Public URLs
        run: |
          kubectl get ingress,svc --namespace "${K8S_NAMESPACE}" -o wide

          FRONTEND_INGRESS_HOST="$(kubectl get ingress "${RELEASE_NAME}" --namespace "${K8S_NAMESPACE}" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
          FRONTEND_SERVICE_HOST="$(kubectl get svc "${RELEASE_NAME}" --namespace "${K8S_NAMESPACE}" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
          BACKEND_RELEASE="task-manager-backend-${K8S_NAMESPACE}"
          BACKEND_INGRESS_HOST="$(kubectl get ingress "${BACKEND_RELEASE}" --namespace "${K8S_NAMESPACE}" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"

          if [ -n "${FRONTEND_INGRESS_HOST}" ]; then
            echo "Frontend URL: http://${FRONTEND_INGRESS_HOST}/"
          elif [ -n "${FRONTEND_SERVICE_HOST}" ]; then
            echo "Frontend URL: http://${FRONTEND_SERVICE_HOST}/"
          else
            echo "Frontend URL is not assigned yet."
          fi

          if [ -n "${BACKEND_INGRESS_HOST}" ]; then
            echo "Backend URL: http://${BACKEND_INGRESS_HOST}/api"
          else
            echo "Backend URL is not assigned yet."
          fi
        env:
          RELEASE_NAME: ${{ steps.settings.outputs.release_name }}
