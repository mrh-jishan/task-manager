services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: task-manager-backend-prod
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    ports:
      - "${PROD_BACKEND_PORT:-3000}:80"
    volumes:
      - backend_storage:/rails/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: task-manager-frontend-prod
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - backend
    ports:
      - "${PROD_FRONTEND_PORT:-3001}:3000"

volumes:
  backend_storage:
